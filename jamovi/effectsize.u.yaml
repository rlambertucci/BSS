---
name: effectSize
title: Effect Size
jus: '3.0'
compilerMode: tame

children:
  - type: ModeSelector
    name: mode
    stretchFactor: 1
    children:
      - type: Content
        name: cross_sectional
        children:
          - type: VariableSupplier
            persistentItems: false
            stretchFactor: 1
            children:
              - type: TargetLayoutBox
                label: Dependent Variables (DVs)
                children:
                  - type: VariablesListBox
                    name: dep_vars_cs
                    isTarget: true
              - type: TargetLayoutBox
                label: "Independent / Grouping Variables (IVs)"
                children:
                  - type: VariablesListBox
                    name: indep_vars_cs
                    isTarget: true
              - type: TargetLayoutBox
                label: "Covariate (Optional)"
                children:
                  - type: VariablesListBox
                    name: cov
                    maxItemCount: 1
                    isTarget: true
          - type: CollapseBox
            label: Effect Size Settings
            collapsed: false
            stretchFactor: 1
            children:
              - type: LayoutBox
                margin: large
                children:
                  - type: ComboBox
                    name: es_method
                    label: Effect Size Method
                  - type: CheckBox
                    name: show_cles
                    label: Calculate CLES (Common Language Effect Size)
                  - type: TextBox
                    name: reference_group
                    label: "Reference Group (Glass' Delta)"
                    format: string
                    enable: (es_method == 'glass_delta')
                  
                  - type: Label
                    label: "GzLM — Average Marginal Effect (AME)"
                    margin: large
                  - type: CheckBox
                    name: use_glm
                    label: Use GzLM — Average Marginal Effect (AME)
                  - type: ComboBox
                    name: es_glm
                    label: GzLM Distribution
                    enable: (use_glm)

      - type: Content
        name: longitudinal
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: Label
                label: "Compare effect sizes across time points (paired samples)."
              - type: ComboBox
                name: long_format
                label: Data Format

          - type: VariableSupplier
            persistentItems: false
            stretchFactor: 1
            children:
              - type: TargetLayoutBox
                label: Dependent Variables (for Long format)
                children:
                  - type: VariablesListBox
                    name: dep_vars_long
                    isTarget: true
                    enable: (long_format == 'long')
              
              - type: TargetLayoutBox
                label: Independent Variables (optional)
                children:
                  - type: VariablesListBox
                    name: indep_vars_long
                    isTarget: true
              - type: TargetLayoutBox
                label: "Covariate (Optional)"
                children:
                  - type: VariablesListBox
                    name: cov_long
                    maxItemCount: 1
                    isTarget: true
              
              - type: TargetLayoutBox
                label: Subject ID Variable
                children:
                  - type: VariablesListBox
                    name: subject_id_var
                    isTarget: true
                    maxItemCount: 1
              
              - type: TargetLayoutBox
                label: "Time / Wave Variable (for Long format)"
                children:
                  - type: VariablesListBox
                    name: time_var
                    isTarget: true
                    maxItemCount: 1
                    enable: (long_format == 'long')
              
              - type: TargetLayoutBox
                label: "Wave Columns (for Wide format)"
                children:
                  - type: VariablesListBox
                    name: wave_vars
                    isTarget: true
                    enable: (long_format == 'wide')

          - type: CollapseBox
            label: Longitudinal Effect Size Settings
            collapsed: false
            stretchFactor: 1
            children:
              - type: LayoutBox
                margin: large
                children:
                  - type: ComboBox
                    name: es_method_long
                    label: "Effect Size Method (Longitudinal)"
                  - type: CheckBox
                    name: show_cles_long
                    label: Calculate CLES (paired)
                  - type: TextBox
                    name: reference_group_long
                    label: "Reference Wave (Glass' Delta z)"
                    format: string
                    enable: (es_method_long == 'glass_dz')

  - type: CollapseBox
    label: Confidence Intervals
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: ComboBox
            name: ci_method
            label: CI Method
          - type: ComboBox
            name: ci_level
            label: Confidence Level
          - type: TextBox
            name: n_bootstrap
            label: Number of Bootstrap Samples
            format: number
            enable: (ci_method == 'bootstrap')

  - type: LayoutBox
    margin: large
    children:
      - type: CheckBox
        name: include_interactions
        label: Calculate interactions between IVs
      - type: CheckBox
        name: run_analysis
        label: "Run Analysis (Compute Results)"