---
name: dataimputation
title: Missing data analysis and imputation
jrs: '1.1'

items:
  - name: imputationInfo_mice_cs
    title: About MICE Cross-sectional Imputation
    type: Html
    visible: (mode == 'mice_cs')

  - name: missingnessTable_mice_cs
    title: Missingness Summary (Cross-sectional)
    type: Table
    visible: (mode == 'mice_cs')
    clearWith:
      - vars_mice_cs
      - predictor_vars_mice_cs
    columns:
      - name: variable
        title: Variable
        type: text
      - name: n_missing
        title: Missing (N)
        type: integer
      - name: pct_missing
        title: Missing (%)
        type: number
        format: dp:1
      - name: n_valid
        title: Valid (N)
        type: integer
      - name: method_used
        title: Method Applied
        type: text

  - name: imputedData_mice_cs
    title: Imputed Values (Pooled)
    type: Table
    visible: (mode == 'mice_cs' && run_imputation_mice_cs)
    refs:
      - mice
    clearWith:
      - vars_mice_cs
      - predictor_vars_mice_cs
      - run_imputation_mice_cs
      - imputation_method_mice_cs
      - num_imputations_mice_cs
      - maxiter_mice_cs
      - seed_mice_cs
    columns:
      - name: variable
        title: Variable
        type: text
        combineBelow: true
      - name: original
        title: Original Value
        type: text
      - name: imputed
        title: Pooled Imputed Value
        type: text
      - name: rowNumber
        title: Row
        type: integer

  - name: patternPlot_mice_cs
    title: Missing Data Pattern (md.pattern)
    type: Image
    width: 700
    height: 500
    renderFun: .renderPatternPlotMiceCS
    visible: (mode == 'mice_cs' && show_pattern_plot_mice_cs)
    requiresData: true
    refs:
      - VIM
    clearWith:
      - vars_mice_cs
      - predictor_vars_mice_cs

  - name: correlationPlot_mice_cs
    title: Missingness Correlation Heatmap
    type: Image
    width: 700
    height: 500
    renderFun: .renderCorrelationPlotMiceCS
    visible: (mode == 'mice_cs' && show_correlation_plot_mice_cs)
    requiresData: true
    refs:
      - GGally
    clearWith:
      - vars_mice_cs
      - predictor_vars_mice_cs

  - name: tracePlot_mice_cs
    title: Convergence Trace Plot
    type: Image
    width: 700
    height: 500
    renderFun: .renderTracePlotMiceCS
    visible: (mode == 'mice_cs' && run_imputation_mice_cs && show_trace_plot_mice_cs)
    requiresData: true
    refs:
      - mice
    clearWith:
      - vars_mice_cs
      - predictor_vars_mice_cs
      - run_imputation_mice_cs
      - imputation_method_mice_cs
      - num_imputations_mice_cs
      - maxiter_mice_cs
      - seed_mice_cs

  - name: densityPlot_mice_cs
    title: Observed vs Imputed Distribution
    type: Image
    width: 700
    height: 500
    renderFun: .renderDensityPlotMiceCS
    visible: (mode == 'mice_cs' && run_imputation_mice_cs && show_density_plot_mice_cs)
    requiresData: true
    refs:
      - mice
    clearWith:
      - vars_mice_cs
      - predictor_vars_mice_cs
      - run_imputation_mice_cs
      - imputation_method_mice_cs
      - num_imputations_mice_cs
      - maxiter_mice_cs
      - seed_mice_cs

  - name: stripPlot_mice_cs
    title: Strip Plot by Variable
    type: Image
    width: 700
    height: 500
    renderFun: .renderStripPlotMiceCS
    visible: (mode == 'mice_cs' && run_imputation_mice_cs && show_strip_plot_mice_cs)
    requiresData: true
    refs:
      - mice
    clearWith:
      - vars_mice_cs
      - predictor_vars_mice_cs
      - run_imputation_mice_cs
      - imputation_method_mice_cs
      - num_imputations_mice_cs
      - maxiter_mice_cs
      - seed_mice_cs

  - name: imputedColsOutput_mice_cs
    type: Output
    title: Imputed Variables (MICE Cross-sectional)
    initInRun: true
    clearWith:
      - data
      - vars_mice_cs
      - predictor_vars_mice_cs
      - imputation_method_mice_cs
      - num_imputations_mice_cs
      - maxiter_mice_cs
      - seed_mice_cs
      - run_imputation_mice_cs

  - name: imputationInfo_mice_long
    title: About MICE Longitudinal Imputation
    type: Html
    visible: (mode == 'mice_long')

  - name: missingnessTable_mice_long
