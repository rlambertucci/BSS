# .a.yaml
---
name: missRangerImputation
title: MissRanger Imputation
menuGroup: BSS
menuSubgroup: Data handling
menuSubtitle: Missing data analysis and multivariate imputation
version: '0.0.2'
jas: '1.2'
options:
    - name: data
      type: Data
      title: Input Data
    - name: vars
      title: Variables to Impute
      type: Variables
      suggested:
        - continuous
        - nominal
        - ordinal
      required: true
      permitted:
        - numeric
        - factor
        - id
    - name: predictor_vars
      title: Predictor Variables (optional)
      type: Variables
      suggested:
        - continuous
        - nominal
        - ordinal
      permitted:
        - numeric
        - factor
      default: null
    - name: maxiter
      title: Maximum Iterations
      type: Integer
      default: 10
      min: 1
      max: 100
    - name: num_trees
      title: Number of Trees
      type: Integer
      default: 100
      min: 1
      max: 200
    - name: pmm_k
      title: Number of Donors for PMM
      type: Integer
      default: 5
      min: 0
      max: 20
    - name: seed
      title: Seed
      type: String
      default: ""
    - name: show_pattern_plot
      title: Missing Pattern Plot
      type: Bool
      default: false
    - name: show_correlation_plot
      title: Missingness Correlation Heatmap
      type: Bool
      default: false
    - name: imputedColsOutput
      title: Save Imputed Variables
      type: Output
...