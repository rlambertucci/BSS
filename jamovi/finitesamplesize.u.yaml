---
title: Finite Population
name: finiteSampleSize
jus: '3.0'
compilerMode: tame
children:
  - type: LayoutBox
    margin: large
    stretchFactor: 1
    children:
      - type: ComboBox
        name: method

  - type: LayoutBox
    margin: large
    stretchFactor: 1
    children:
      - type: TextBox
        name: population_size
        label: Population Size (N)
        format: number
      - type: TextBox
        name: confidence_level
        label: Confidence Level (%)
        format: number
      - type: TextBox
        name: margin_error
        label: Margin of Error (%)
        format: number

  - type: CollapseBox
    label: Cochran Additional Parameter
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        stretchFactor: 1
        children:
          - type: TextBox
            name: population_proportion
            label: Population Proportion (p)
            format: number
...