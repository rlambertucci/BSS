---
name: correlationComparison
title: Compare Correlations
jus: '3.0'
compilerMode: tame
children:
  - type: LayoutBox
    margin: large
    stretchFactor: 1
    children:
      - type: ComboBox
        name: correlation_type

  - type: CollapseBox
    label: Independent Correlations
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        stretchFactor: 1
        children:
          - type: TextBox
            name: independent_n1
            label: Sample Size (Group 1)
            format: number
          - type: TextBox
            name: independent_n2
            label: Sample Size (Group 2)
            format: number
          - type: TextBox
            name: independent_r1
            label: Correlation Coefficient (Group 1)
            format: number
          - type: TextBox
            name: independent_r2
            label: Correlation Coefficient (Group 2)
            format: number

  - type: CollapseBox
    label: Dependent Correlations
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        stretchFactor: 1
        children:
          - type: TextBox
            name: dependent_n
            label: Sample Size
            format: number
          - type: TextBox
            name: dependent_r12
            label: Correlation Coefficient (r₁₂ — Var 1 vs Var 2)
            format: number
          - type: TextBox
            name: dependent_r13
            label: Correlation Coefficient (r₁₃ — Var 1 vs Var 3)
            format: number
          - type: TextBox
            name: dependent_r23
            label: Correlation Coefficient (r₂₃ — Var 2 vs Var 3)
            format: number
...