---
title: Outlier Detection
name: ModifiedZ
jus: '3.0'
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Variables
        children:
          - type: VariablesListBox
            name: vars
            isTarget: true
      - type: TargetLayoutBox
        label: Grouping Variables
        children:
          - type: VariablesListBox
            name: group
            isTarget: true

  - type: CollapseBox
    label: Detection Settings
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        stretchFactor: 1
        children:
          - type: ComboBox
            name: threshold
          - type: CheckBox
            name: dispBox

  - type: CollapseBox
    label: Treatment Options
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        stretchFactor: 1
        children:
          - type: ComboBox
            name: treatment
          - type: TextBox
            name: trimPercent
            label: Symmetric Trimming Percentage (%)
            format: number

  - type: CollapseBox
    label: Output
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        stretchFactor: 1
        children:
          - type: Output
            name: treatedData
...