---
name: missRangerImputation
title: MissRanger Imputation
jus: '3.0'
compilerMode: tame
children:
  - type: VariableSupplier
    name: variablesupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Variables to Impute
        children:
          - type: VariablesListBox
            name: vars
            isTarget: true
      - type: TargetLayoutBox
        label: Predictor Variables (optional)
        children:
          - type: VariablesListBox
            name: predictor_vars
            isTarget: true

  - type: CollapseBox
    label: Imputation Settings
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        stretchFactor: 1
        children:
          - type: TextBox
            name: maxiter
            label: Maximum Iterations
            format: number
          - type: TextBox
            name: num_trees
            label: Number of Trees
            format: number
          - type: TextBox
            name: pmm_k
            label: Number of Donors for PMM
            format: number
          - type: TextBox
            name: seed
            label: Seed (leave empty for random)
            format: string

  - type: CollapseBox
    label: Diagnostic Plots
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        stretchFactor: 1
        children:
          - type: CheckBox
            name: show_pattern_plot
          - type: CheckBox
            name: show_correlation_plot

  - type: CollapseBox
    label: Save
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        stretchFactor: 1
        children:
          - type: Output
            name: imputedColsOutput
...