---
title: Sample size calculation
name: samplesize
jus: '3.0'
compilerMode: tame
children:
  - type: ModeSelector
    name: mode
    children:
      - type: Content
        name: finite
        children:
          - type: LayoutBox
            margin: large
            stretchFactor: 1
            children:
              - type: ComboBox
                name: method_finite

          - type: LayoutBox
            margin: large
            stretchFactor: 1
            children:
              - type: TextBox
                name: population_size_finite
                label: Population Size (N)
                format: number
              - type: TextBox
                name: confidence_level_finite
                label: Confidence Level (%)
                format: number
              - type: TextBox
                name: margin_error_finite
                label: Margin of Error (%)
                format: number

          - type: CollapseBox
            label: Cochran Additional Parameter
            collapsed: true
            stretchFactor: 1
            children:
              - type: LayoutBox
                margin: large
                stretchFactor: 1
                children:
                  - type: TextBox
                    name: population_proportion_finite
                    label: Population Proportion (p)
                    format: number

      - type: Content
        name: animals
        children:
          - type: LayoutBox
            margin: large
            children:
              - type: ComboBox
                name: design_animals
          - type: LayoutBox
            margin: large
            children:
              - type: TextBox
                name: nGroups_animals
                format: number
          - type: LayoutBox
            margin: large
            children:
              - type: TextBox
                name: nMeasures_animals
                format: number
          - type: LayoutBox
            margin: large
            children:
              - type: CheckBox
                name: sacrifice_animals
...
