---
title: Descriptive Discriminant Analysis
name: DDA
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Dependent
        children:
          - type: VariablesListBox
            name: dep
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        label: Covariates
        children:
          - type: VariablesListBox
            name: covs
            isTarget: true

  - type: CollapseBox
    label: Results
    collapsed: false
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        stretchFactor: 1
        children:
          - type: CheckBox
            name: prop
          - type: CheckBox
            name: coef
          - type: CheckBox
            name: structCoef
          - type: CheckBox
            name: gc

  - type: CollapseBox
    label: Plot Options
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        stretchFactor: 1
        children:
          - type: CheckBox
            name: plot
          - type: TextBox
            name: width
            label: Plot Width
            format: number
          - type: TextBox
            name: height
            label: Plot Height
            format: number

  - type: CollapseBox
    label: Advanced
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        stretchFactor: 1
        children:
          - type: CheckBox
            name: discScores
          - type: CheckBox
            name: pairwiseES
...