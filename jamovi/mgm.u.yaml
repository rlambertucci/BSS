---
title: For mixed data
name: mgm
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Continuous Variables (Gaussian)
        children:
          - type: VariablesListBox
            name: varsCont
            isTarget: true
      - type: TargetLayoutBox
        label: Categorical Variables
        children:
          - type: VariablesListBox
            name: varsCat
            isTarget: true
      - type: TargetLayoutBox
        label: Count Variables (Poisson)
        children:
          - type: VariablesListBox
            name: varsCount
            isTarget: true
      - type: TargetLayoutBox
        label: Grouping Variable
        children:
          - type: VariablesListBox
            name: groupVar
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        label: Node Groups Variable
        children:
          - type: VariablesListBox
            name: nodeGroupVar
            maxItemCount: 1
            isTarget: true

  - type: CollapseBox
    label: Estimation Settings
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        stretchFactor: 1
        children:
          - type: ComboBox
            name: lambdaSelMethod
          - type: TextBox
            name: kFolds
            label: Number of Folds (if CV selected)
            format: number
          - type: TextBox
            name: lambdaGam
            label: Gamma for EBIC (if EBIC selected)
            format: number
          - type: ComboBox
            name: ruleReg

  - type: CollapseBox
    label: Tables
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        stretchFactor: 1
        children:
          - type: CheckBox
            name: tableCentrality
          - type: CheckBox
            name: tableClustering
          - type: CheckBox
            name: tableWeights

  - type: CollapseBox
    label: Plots
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        stretchFactor: 1
        children:
          - type: CheckBox
            name: plotCentrality
          - type: CheckBox
            name: plotClustering
          - type: CheckBox
            name: plotNetwork

  - type: CollapseBox
    label: Network Settings
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        stretchFactor: 1
        children:
          - type: ComboBox
            name: layoutAlgorithm
          - type: CheckBox
            name: showLabels
          - type: TextBox
            name: plotWidth
            label: Network Plot Width
            format: number
          - type: TextBox
            name: plotHeight
            label: Network Plot Height
            format: number
...