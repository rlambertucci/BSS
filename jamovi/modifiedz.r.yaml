---
name: ModifiedZ
title: Outlier Detection Results
jrs: '1.1'
items:
    - name: iqrInfo  
      title: Thresholds 
      type: Html          
      visible: True       
      
    - name: text
      title: Modified Z-Score Outlier Detection Summary
      type: Preformatted
      
    - name: outlierTable
      title: Outliers Summary
      type: Table
      columns:
          - name: variable
            title: Variable
            type: text
            content: ($key)
          - name: group_level  
            title: Group
            type: text
          - name: lowerThreshold
            title: Lower Threshold
            type: number
          - name: upperThreshold
            title: Upper Threshold
            type: number
          - name: numOutliers
            title: Outliers Detected
            type: integer
          - name: treatmentApplied
            title: Treatment Applied
            type: text
            visible: (treatment != 'none')
          - name: modifiedN
            title: Valid N (After Treatment)
            type: integer
            visible: (treatment != 'none')

    - name: outlierList
      title: Identified Outliers
      type: Table
      columns:
          - name: variable
            title: Variable
            type: text
            combineBelow: true
          - name: group_level
            title: Group
            type: text
            combineBelow: true
          - name: rowNumber
            title: Row
            type: integer
          - name: modifiedZ
            title: Modified Z-Score
            type: number

    - name: plot
      title: Boxplot
      type: Image
      width: 500
      height: 400
      renderFun: .plot
      visible: (dispBox)

    - name: treatedData
      title: Treated Variables
      type: Output
      initInRun: true
      clearWith:
        - vars
        - group
        - threshold
        - treatment
        - trimPercent
...