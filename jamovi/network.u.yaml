---
title: For continuous data
name: Network
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Variables
        children:
          - type: VariablesListBox
            name: vars
            isTarget: true
      - type: TargetLayoutBox
        label: Grouping Variable
        children:
          - type: VariablesListBox
            name: groupVar
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        label: Node Groups Variable
        children:
          - type: VariablesListBox
            name: nodeGroupVar
            maxItemCount: 1
            isTarget: true

  - type: LayoutBox
    margin: large
    stretchFactor: 1
    children:
      - type: ComboBox
        name: estimator
      - type: ComboBox
        name: corMethod

  - type: CollapseBox
    label: Tables
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        stretchFactor: 1
        children:
          - type: CheckBox
            name: tableCentrality
          - type: CheckBox
            name: tableClustering
          - type: CheckBox
            name: tableWeights

  - type: CollapseBox
    label: Plots
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        stretchFactor: 1
        children:
          - type: CheckBox
            name: plotCentrality
          - type: CheckBox
            name: plotClustering
          - type: CheckBox
            name: plotNetwork

  - type: CollapseBox
    label: Network Settings
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        stretchFactor: 1
        children:
          - type: ComboBox
            name: layoutAlgorithm
          - type: CheckBox
            name: showLabels
          - type: TextBox
            name: plotWidth
            label: Network Plot Width
            format: number
          - type: TextBox
            name: plotHeight
            label: Network Plot Height
            format: number
...