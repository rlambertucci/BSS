description: >-
  The BSS module provides a comprehensive suite of statistical tools organized 
  according to the main stages of data analysis. It includes: (1) data
  screening, cleaning and presentation tools, such as outlier detection (Dixon’s
  Q Test, IQR, and  modified Z-score), missing data imputation (missRanger and
  MICE), and a highly customizable group comparison plots (bar charts, boxplots,
  and mean-dispersion graphs) for both cross-sectional and longitudinal designs,
  including automated publication-ready descriptive tables (APA, ABNT,
  Vancouver, and Chicago styles). (2) association analyses, including
  correlation comparison (independent and  dependent) and network modeling for
  continuous and mixed data;  (3) post-analysis tools for result interpretation,
  including pairwise effect  size estimation and post hoc analysis for MANOVA
  using descriptive discriminant  analysis (DDA); and (4) study planning tools,
  including sample size calculation  for finite populations and animal
  experimental designs based on the Resource  Equation Approach.
