type: R
description: >-
  This module provides a variety of statistical procedures for different data 
  analysis needs. The main features include: 1) network analysis for continuous
  and mixed data; 2) missing value analysis and data imputation using the 
  missRanger package; 3) post hoc analysis for MANOVA using descriptive 
  discriminant analysis (including effect size calculation); 4) outlier 
  detection using boxplots and the modified z-score with adjustable thresholds 
  and options for outlier treatment; 5) sample size calculation for finite 
  populations (using two different formulas) and for animal experimental designs
  based on the Resource Equation Approach; 6) statistical comparison of 
  correlation coefficients (independent and dependent).
