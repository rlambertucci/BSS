# working
---
name: outlierDetection
title: Outlier Detection
menuGroup: BSS
menuSubgroup: Data handling
menuSubtitle: IQR Method
version: '1.0.0'
jas: '1.2'
options:
    - name: data
      type: Data
    - name: vars
      title: Variables
      type: Variables
      suggested:
        - continuous
      permitted:
        - numeric
    - name: group
      title: Grouping Variables
      type: Variables
      suggested:
        - nominal
        - ordinal
      permitted:
        - factor
    - name: iqrMultiplier
      title: IQR Multiplier Range
      type: List
      options:
        - name: iqr15
          title: '1.5 x IQR (Classic)'
        - name: iqr22
          title: '2.2 x IQR'
        - name: iqr30
          title: '3.0 x IQR (Extreme)'
      default: iqr15
    - name: treatment
      title: Treatment Method
      type: List
      options:
        - name: none
          title: None (Detection Only)
        - name: trim_asym
          title: Asymmetric Trimming (Identified Outliers)
        - name: trim_sym
          title: Symmetric Trimming (%)
        - name: win_valid
          title: Winsorize (To max/min valid value)
        - name: win_fence
          title: Winsorize (To fence limits)
      default: none
    - name: trimPercent
      title: Symmetric Trimming Percentage (%)
      type: Number
      default: 5
      min: 1
      max: 49
    - name: dispBox
      title: Display Boxplot
      type: Bool
      default: true
    - name: treatedData
      title: Save treated variables to dataset
      type: Output
...