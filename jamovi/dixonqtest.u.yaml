---
title: Outlier Detection
name: dixonQTest
jus: '3.0'
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Variable
        children:
          - type: VariablesListBox
            name: var
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        label: Grouping Variables
        children:
          - type: VariablesListBox
            name: group
            isTarget: true

  - type: CollapseBox
    label: Detection Settings
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        stretchFactor: 1
        children:
          - type: ComboBox
            name: alpha
          - type: CheckBox
            name: dispBox

  - type: CollapseBox
    label: Treatment
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        stretchFactor: 1
        children:
          - type: ComboBox
            name: treatment

  - type: CollapseBox
    label: Output
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        stretchFactor: 1
        children:
          - type: Output
            name: treatedData
...