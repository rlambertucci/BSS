    clearWith:
      - varsCont_mixed
      - varsCat_mixed
      - varsCount_mixed
      - groupVar_mixed
      - nodeGroupVar_mixed
      - lambdaSelMethod_mixed
      - kFolds_mixed
      - lambdaGam_mixed
      - ruleReg_mixed

  - name: networkPlot_mixed
    title: Network Plot
    type: Image
    requiresData: true
    visible: (mode == 'mixed' && plotNetwork_mixed)
    renderFun: .plotNetwork_mixed
    refs:
      - mgm
      - qgraph
    clearWith:
      - varsCont_mixed
      - varsCat_mixed
      - varsCount_mixed
      - groupVar_mixed
      - nodeGroupVar_mixed
      - lambdaSelMethod_mixed
      - kFolds_mixed
      - lambdaGam_mixed
      - ruleReg_mixed
      - layoutAlgorithm_mixed
      - showLabels_mixed
      - plotWidth_mixed
      - plotHeight_mixed
