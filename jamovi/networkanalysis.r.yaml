      - groupVar_mixed
      - nodeGroupVar_mixed
      - lambdaSelMethod_mixed
      - kFolds_mixed
      - lambdaGam_mixed
      - ruleReg_mixed

  - name: clusteringPlot_mixed
    title: Clustering Plot
    type: Image
    requiresData: true
    visible: (mode == 'mixed' && plotClustering_mixed)
    renderFun: .plotClustering_mixed
    refs:
      - mgm
      - qgraph
      - igraph
      - ggplot2
      - reshape2
