      - name: sparsity
        title: 'Sparsity'
        type: number
        format: zto

  - name: centrality_mixed
    title: Centrality Measures
    type: Table
    visible: (mode == 'mixed' && tableCentrality_mixed)
    refs:
      - mgm
      - qgraph
    clearWith:
      - varsCont_mixed
      - varsCat_mixed
      - varsCount_mixed
      - groupVar_mixed
      - nodeGroupVar_mixed
      - lambdaSelMethod_mixed
      - kFolds_mixed
      - lambdaGam_mixed
      - ruleReg_mixed
    columns:
      - name: group
        title: 'Group'
        type: text
        visible: (groupVar_mixed)
      - name: variable
        title: 'Variable'
        type: text
        format: string
      - name: strength
        title: 'Strength'
        type: number
      - name: closeness
        title: 'Closeness'
        type: number
      - name: betweenness
        title: 'Betweenness'
        type: number
      - name: expectedInfluence
        title: 'Expected Influence'
        type: number

  - name: clustering_mixed
    title: Clustering Measures per Variable
    type: Table
    visible: (mode == 'mixed' && tableClustering_mixed)
    refs:
      - mgm
      - qgraph
      - igraph
    clearWith:
      - varsCont_mixed
      - varsCat_mixed
      - varsCount_mixed
      - groupVar_mixed
      - nodeGroupVar_mixed
      - lambdaSelMethod_mixed
      - kFolds_mixed
      - lambdaGam_mixed
      - ruleReg_mixed
    columns:
      - name: group
        title: 'Group'
        type: text
        visible: (groupVar_mixed)
      - name: node
        title: 'Variable'
        type: text
        format: string
      - name: Barrat
        title: 'Barrat'
        type: number
      - name: Onnela
        title: 'Onnela'
        type: number
      - name: WS
        title: 'WS'
        type: number
      - name: Zhang
        title: 'Zhang'
        type: number

  - name: weights_mixed
    title: Weights (Adjacency Matrix)
    type: Table
    visible: (mode == 'mixed' && tableWeights_mixed)
    refs:
      - mgm
    clearWith:
      - varsCont_mixed
      - varsCat_mixed
      - varsCount_mixed
      - groupVar_mixed
      - nodeGroupVar_mixed
      - lambdaSelMethod_mixed
      - kFolds_mixed
      - lambdaGam_mixed
      - ruleReg_mixed
    columns:
      - name: group
        title: 'Group'
        type: text
        visible: (groupVar_mixed)
      - name: rowname
        title: ''
        type: text
        format: string

  - name: centralityPlot_mixed
    title: Centrality Plot
    type: Image
    requiresData: true
    visible: (mode == 'mixed' && plotCentrality_mixed)
