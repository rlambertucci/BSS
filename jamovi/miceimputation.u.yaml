---
name: miceImputation
title: MICE Imputation
jus: '3.0'
compilerMode: tame
children:
  - type: VariableSupplier
    name: variablesupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Variables to Impute
        children:
          - type: VariablesListBox
            name: vars
            isTarget: true
      - type: TargetLayoutBox
        label: Predictor Variables (optional)
        children:
          - type: VariablesListBox
            name: predictor_vars
            isTarget: true

  - type: CollapseBox
    label: Missing Data Plots
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        stretchFactor: 1
        children:
          - type: CheckBox
            name: show_pattern_plot
          - type: CheckBox
            name: show_correlation_plot

  - type: CollapseBox
    label: ⚠ Longitudinal Settings (2l methods only)
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        stretchFactor: 1
        children:
          - type: Label
            label: >
              Use these settings when data has repeated measures or hierarchical
              structure. Required for 2l.pmm and 2l.norm methods. Data must be
              in long format or converted below.
          - type: ComboBox
            name: data_format
            label: Data Format
          - type: VariableSupplier
            name: longitudinalSupplier
            persistentItems: false
            stretchFactor: 1
            children:
              - type: TargetLayoutBox
                label: Subject ID Variable
                children:
                  - type: VariablesListBox
                    name: subject_id_var
                    isTarget: true
                    maxItemCount: 1
              - type: TargetLayoutBox
                label: Time / Wave Variable
                children:
                  - type: VariablesListBox
                    name: time_var
                    isTarget: true
                    maxItemCount: 1
              - type: TargetLayoutBox
                label: Group / Cluster Variable
                children:
                  - type: VariablesListBox
                    name: group_var
                    isTarget: true
                    maxItemCount: 1
              - type: TargetLayoutBox
                label: Fixed Covariates (predictors only)
                children:
                  - type: VariablesListBox
                    name: fixed_covariates
                    isTarget: true
              - type: TargetLayoutBox
                label: Wave Columns (wide format only)
                children:
                  - type: VariablesListBox
                    name: wave_vars
                    isTarget: true
                    enable: (data_format == 'wide')

  - type: CollapseBox
    label: Imputation Settings
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        stretchFactor: 1
        children:
          - type: ComboBox
            name: imputation_method
            label: Imputation Method
          - type: TextBox
            name: num_imputations
            label: Number of Imputations (m)
            format: number
          - type: TextBox
            name: maxiter
            label: Maximum Iterations
            format: number
          - type: TextBox
            name: seed
            label: Seed (leave empty for random)
            format: string
          - type: CheckBox
            name: run_imputation
            label: Run Imputation

  - type: CollapseBox
    label: Imputation Quality Plots
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        stretchFactor: 1
        children:
          - type: Label
            label: Requires Run Imputation to be checked.
          - type: CheckBox
            name: show_trace_plot
          - type: CheckBox
            name: show_density_plot
          - type: CheckBox
            name: show_strip_plot

  - type: CollapseBox
    label: Save
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        stretchFactor: 1
        children:
          - type: Label
            label: >
              Saves one imputed column per variable (e.g. var1_imputed). Values
              are pooled across all m imputations (Mean for continuous, Mode for
              categorical).
          - type: Output
            name: imputedColsOutput
...